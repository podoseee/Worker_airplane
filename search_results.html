                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
                        <li class="nav-item"><a class="nav-link" href="hot_deals.html">초특가 추천</a></li>

                    </ul>
                </div>
            </div>
        </nav>

        <!-- Main Section -->
        <section class="page-section" style="margin-top: 100px;">
            <div class="container">
                <div class="text-center mb-5">
                    <h2 class="section-heading text-uppercase">항공권 검색 결과</h2>
                    <h3 class="section-subheading text-muted">당신의 조건에 맞는 항공권을 찾았습니다</h3>
                </div>
                
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">검색 필터</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-4">
                            <label class="form-label fw-bold">가격 범위</label>
                            <input type="range" class="form-range" min="100000" max="2000000" step="50000">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">출발 시간</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="morning" checked>
                                <label class="form-check-label" for="morning">오전 (06:00~12:00)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="afternoon" checked>
                                <label class="form-check-label" for="afternoon">오후 (12:00~18:00)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="evening" checked>
                                <label class="form-check-label" for="evening">저녁 (18:00~24:00)</label>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100">필터 적용</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-9">
                <div class="row" id="searchResults"></div>
            </div>
        </div>
        <script src="js/data.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const resultsContainer = document.getElementById('searchResults');
                const flights = window.flightData || [];
                flights.forEach(flight => {
                    const card = document.createElement('div');
                    card.className = 'col-lg-6 mb-4';
                    card.innerHTML = `<div class="card shadow-sm h-100"><img src="${flight.img}" class="card-img-top" alt="${flight.destination}"><div class="card-body"><h5 class="card-title">${flight.destination}</h5><p class="card-text text-muted">${flight.description}</p><div class="d-flex justify-content-between align-items-center mb-3"><span class="badge bg-info">${flight.badge}</span><strong class="text-primary">${flight.price.toLocaleString()} 원</strong></div><a href="flight_detail.html" class="btn btn-primary btn-sm w-100">상세 보기</a></div></div>`;
                    resultsContainer.appendChild(card);
                });
            });
        </script>
        
            </div>
        </section>

        <footer class="footer py-4">

                    </div>
                </div>
            </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

        <script src="js/scripts.js"></script>
    </body>
</html>
