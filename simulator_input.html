        <!-- Main Section -->

            <div class="container">
                <div class="text-center mb-5">
                    <h2 class="section-heading text-uppercase">퇴근 시뮬레이터 설정</h2>
                    <h3 class="section-subheading text-muted">당신의 일정에 맞춘 여행 계획을 세워보세요</h3>
                </div>
                
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body p-5">
                        <form>
                            <div class="mb-4">
                                <label for="departTime" class="form-label fw-bold">평일 퇴근 시간</label>
                                <input type="time" class="form-control form-control-lg" id="departTime" value="18:00">
                            </div>
                            <div class="mb-4">
                                <label for="departDate" class="form-label fw-bold">출발 요일</label>
                                <select class="form-select form-select-lg" id="departDate">
                                    <option selected>금요일 (1박 2일)</option>
                                    <option>목요일 (2박 3일)</option>
                                    <option>수요일 (3박 4일)</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label for="season" class="form-label fw-bold">선호 계절</label>
                                <select class="form-select form-select-lg" id="season">
                                    <option selected>여름 (6~8월)</option>
                                    <option>가을 (9~11월)</option>
                                    <option>겨울 (12~2월)</option>
                                    <option>봄 (3~5월)</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label for="destination" class="form-label fw-bold">선호 지역</label>
                                <select class="form-select form-select-lg" id="destination">
                                    <option selected>동아시아 (일본, 대만)</option>
                                    <option>동남아시아 (태국, 베트남)</option>
                                    <option>홍콩/마카오</option>
                                </select>
                            </div>
                            <a href="simulator_timeline.html" class="btn btn-primary btn-lg w-100">시뮬레이션 시작</a>
                        </form>
                    </div>
                </div>
