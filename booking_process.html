        <!-- Main Section -->
        <section class="page-section" style="margin-top: 100px;">
            <div class="container">
                <div class="text-center mb-5">
                    <h2 class="section-heading text-uppercase">항공권 예약</h2>
                    <h3 class="section-subheading text-muted">예약을 진행하세요</h3>
                </div>
                
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body p-5">
                        <div class="mb-4">
                            <h5>예약 단계</h5>
                            <div class="progress mb-3">
                                <div class="progress-bar" role="progressbar" style="width: 33%;" aria-valuenow="33" aria-valuemin="0" aria-valuemax="100">1/3</div>
                            </div>
                        </div>

                        <form>
                            <h6 class="mb-3">승객 정보</h6>
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">이름 (영문)</label>
                                <input type="text" class="form-control" id="name" placeholder="Hong Gildong">
                            </div>
                            <div class="mb-3">
                                <label for="passport" class="form-label fw-bold">여권번호</label>
                                <input type="text" class="form-control" id="passport" placeholder="M12345678">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">이메일</label>
                                <input type="email" class="form-control" id="email" placeholder="your@email.com">
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label fw-bold">휴대폰</label>
                                <input type="tel" class="form-control" id="phone" placeholder="010-1234-5678">
                            </div>

                            <hr>

                            <h6 class="mb-3">좌석 선택</h6>
                            <div class="mb-3">
                                <label for="seat" class="form-label fw-bold">선호 좌석</label>
                                <select class="form-select" id="seat">
                                    <option selected>창가 좌석</option>
                                    <option>통로 좌석</option>
                                    <option>중앙 좌석</option>
                                </select>
                            </div>

                            <a href="booking_confirm.html" class="btn btn-primary btn-lg w-100">다음 단계</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
