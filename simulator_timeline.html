        <!-- Main Section -->

            <div class="container">
                <div class="text-center mb-5">
                    <h2 class="section-heading text-uppercase">당신의 퇴근 후 여행 일정</h2>
                    <h3 class="section-subheading text-muted">시간대별 여행 계획을 확인하세요</h3>
                </div>
                
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <ul class="timeline" id="timelineContainer">
                    <!-- 타임라인 아이템이 동적으로 로드됩니다 -->
                </ul>
            </div>
        </div>
        <script src="js/data.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const timelineContainer = document.getElementById('timelineContainer');
                const timelines = window.timelineData || [];
                timelines.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = index % 2 === 0 ? '' : 'timeline-inverted';
                    li.innerHTML = `
                        <div class="timeline-image"><i class="${item.icon} fa-2x text-primary"></i></div>
                        <div class="timeline-panel">
                            <div class="timeline-heading">
                                <h4>${item.time}</h4>
                                <h4 class="subheading">${item.event}</h4>
                            </div>
                            <div class="timeline-body"><p class="text-muted">${item.detail}</p></div>
                        </div>
                    `;
                    timelineContainer.appendChild(li);
                });
            });
        </script>
        
            </div>
