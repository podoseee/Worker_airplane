        <!-- Main Section -->
        <section class="page-section" style="margin-top: 100px;">
            <div class="container">
                <div class="text-center mb-5">
                    <h2 class="section-heading text-uppercase">초특가 추천</h2>
                    <h3 class="section-subheading text-muted">이 주의 가장 저렴한 항공권을 놓치지 마세요</h3>
                </div>
                
        <div class="row" id="hotDealsContainer">
            <!-- 초특가 항공권이 동적으로 로드됩니다 -->
        </div>
        <script src="js/data.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const container = document.getElementById('hotDealsContainer');
                const flights = window.flightData || [];
                const sorted = flights.sort((a, b) => a.price - b.price);
                sorted.forEach(flight => {
                    const card = document.createElement('div');
                    card.className = 'col-lg-4 mb-4';
                    card.innerHTML = `<div class="card shadow-sm h-100 border-danger"><div class="card-header bg-danger text-white"><span class="badge bg-light text-danger">초특가</span></div><img src="${flight.img}" class="card-img-top" alt="${flight.destination}"><div class="card-body"><h5 class="card-title">${flight.destination}</h5><p class="card-text text-muted">${flight.description}</p><div class="d-flex justify-content-between align-items-center"><strong class="text-danger h5">${flight.price.toLocaleString()} 원</strong><a href="flight_detail.html" class="btn btn-sm btn-danger">예약</a></div></div></div>`;
                    container.appendChild(card);
                });
            });
        </script>
        
            </div>
        </section>
